- hosts: app
  become: yes

  vars:
    db_host: "terraform-20260402093418968200000007.cri4yu2caarb.ap-south-1.rds.amazonaws.com"
    db_user: "admin"
    db_pass: "password123"
    db_name: "testdb"

  tasks:
    - name: Install PHP
      apt:
        name:
          - php
          - php-mysql
        state: present
        update_cache: yes

    - name: Deploy PHP
      copy:
        dest: /var/www/html/submit.php
        content: |
          <?php
          $conn = new mysqli("{{ db_host }}","{{ db_user }}","{{ db_pass }}","{{ db_name }}");

          if ($conn->connect_error) {
              die("Connection failed: " . $conn->connect_error);
          }

          $name = $_POST['name'];

          $sql = "INSERT INTO users (name) VALUES ('$name')";
          $conn->query($sql);

          echo "Data saved successfully!";
          ?>